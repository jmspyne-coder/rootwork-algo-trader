name: Trading Schedule

on:
  schedule:
    # Both EDT and EST UTC offsets are scheduled; the in-script ET guard
    # (src/timeguard.py) makes only the correctly-timed run act, so the bot
    # trades year-round instead of drifting an hour off across DST.
    - cron: '25 13 * * 1-5'   # pre-market  09:25 ET (EDT)
    - cron: '25 14 * * 1-5'   # pre-market  09:25 ET (EST)
    - cron: '40 13 * * 1-5'   # execute ORB 09:40 ET (EDT)
    - cron: '40 14 * * 1-5'   # execute ORB 09:40 ET (EST)
    - cron: '45 19 * * 1-5'   # end-of-day  15:45 ET (EDT)
    - cron: '45 20 * * 1-5'   # end-of-day  15:45 ET (EST)
    - cron: '58 13 * * 1-5'   # health check 09:58 ET (EDT) — independent watchdog
    - cron: '58 14 * * 1-5'   # health check 09:58 ET (EST)
  workflow_dispatch:
    inputs:
      script:
        description: 'Which script to run'
        required: true
        type: choice
        options:
          - pre_market
          - execute_orb
          - end_of_day
          - backtest
          - param_sweep
          - smoke_order
          - cancel_orders
          - health_check
      dry_run:
        description: 'Dry run (execute_orb only): run the full path but place NO orders'
        required: false
        type: boolean
        default: false

concurrency:
  # Serialize identical triggers so two firings can't both act. Combined with the
  # deterministic client_order_id (broker rejects duplicates), this prevents a
  # double-entry even if the PC and the Mac both fire. Queue, never cancel a run
  # mid-order.
  group: algo-${{ github.event.inputs.script || github.event.schedule }}
  cancel-in-progress: false

env:
  ALPACA_API_KEY_ID: ${{ secrets.ALPACA_API_KEY_ID }}
  ALPACA_API_SECRET_KEY: ${{ secrets.ALPACA_API_SECRET_KEY }}
  MOTHERDUCK_TOKEN: ${{ secrets.MOTHERDUCK_TOKEN }}
  SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
  ALPACA_PAPER: 'true'
  ALGO_TICKER: 'SPY'          # single-symbol default (backtest/manual)
  ALGO_TICKERS: 'SPY,QQQ'     # live trading set (execute/pre/EOD loop over these)
  DRY_RUN: ${{ github.event.inputs.dry_run || 'false' }}  # true only on a manual dry-run dispatch
  GMAIL_ADDRESS: ${{ secrets.GMAIL_ADDRESS }}
  GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}

jobs:
  pre-market:
    if: >
      (github.event_name == 'schedule' && (github.event.schedule == '25 13 * * 1-5' || github.event.schedule == '25 14 * * 1-5')) ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.script == 'pre_market')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
      - run: pip install -r requirements.txt
      - run: python -m src.pre_market

  execute-orb:
    if: >
      (github.event_name == 'schedule' && (github.event.schedule == '40 13 * * 1-5' || github.event.schedule == '40 14 * * 1-5')) ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.script == 'execute_orb')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
      - run: pip install -r requirements.txt
      - run: python -m src.execute_orb

  end-of-day:
    if: >
      (github.event_name == 'schedule' && (github.event.schedule == '45 19 * * 1-5' || github.event.schedule == '45 20 * * 1-5')) ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.script == 'end_of_day')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
      - run: pip install -r requirements.txt
      - run: python -m src.end_of_day

  backtest:
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.script == 'backtest'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
      - run: pip install -r requirements.txt
      - run: python -m src.backtest --ticker SPY --start 2024-01-01 --end 2026-06-01
      - uses: actions/upload-artifact@v4
        with:
          name: backtest-results
          path: backtest_*.csv

  param-sweep:
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.script == 'param_sweep'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
      - run: pip install -r requirements.txt
      - run: python -m src.param_sweep --start 2024-01-01 --end 2026-06-01
      - uses: actions/upload-artifact@v4
        with:
          name: sweep-results
          path: sweep_results_*.csv

  smoke-order:
    # Manual order-path test only. Places a tiny 1-share SPY bracket tagged
    # strategy='smoke_test'. Run end_of_day after to reconcile, then delete the rows.
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.script == 'smoke_order'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
      - run: pip install -r requirements.txt
      - run: python -m src.smoke_order

  cancel-orders:
    # Manual: cancel all open orders (clear stray/leftover orders).
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.script == 'cancel_orders'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
      - run: pip install -r requirements.txt
      - run: python -m src.cancel_orders

  health-check:
    # Independent morning watchdog (~09:58 ET): alarms LOUDLY if execute_orb did
    # not run today. Runs on a clock separate from the trigger, so a dead
    # trigger machine is exactly what it catches.
    if: >
      (github.event_name == 'schedule' && (github.event.schedule == '58 13 * * 1-5' || github.event.schedule == '58 14 * * 1-5')) ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.script == 'health_check')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
      - run: pip install -r requirements.txt
      - run: python -m src.health_check
