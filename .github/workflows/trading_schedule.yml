name: Trading Schedule

on:
  schedule:
    # Both EDT and EST UTC offsets are scheduled; the in-script ET guard
    # (src/timeguard.py) makes only the correctly-timed run act, so the bot
    # trades year-round instead of drifting an hour off across DST.
    - cron: '25 13 * * 1-5'   # pre-market  09:25 ET (EDT)
    - cron: '25 14 * * 1-5'   # pre-market  09:25 ET (EST)
    - cron: '40 13 * * 1-5'   # execute ORB 09:40 ET (EDT)
    - cron: '40 14 * * 1-5'   # execute ORB 09:40 ET (EST)
    - cron: '45 19 * * 1-5'   # end-of-day  15:45 ET (EDT)
    - cron: '45 20 * * 1-5'   # end-of-day  15:45 ET (EST)
    - cron: '58 13 * * 1-5'   # health check 09:58 ET (EDT) — independent watchdog
    - cron: '58 14 * * 1-5'   # health check 09:58 ET (EST)
    - cron: '5 13 * * 1-5'    # pre-open failsafe 09:05 ET (EDT) — verify+alert before the open
    - cron: '5 14 * * 1-5'    # pre-open failsafe 09:05 ET (EST)
    - cron: '*/30 13-20 * * 1-5'  # intraday risk monitor every 30 min (ET-guarded to 10:00-15:35)
    - cron: '0 21 * * 5'          # weekly report Friday ~16:00-17:00 ET (after close)
  workflow_dispatch:
    inputs:
      script:
        description: 'Which script to run'
        required: true
        type: choice
        options:
          - pre_market
          - execute_orb
          - end_of_day
          - backtest
          - param_sweep
          - smoke_order
          - cancel_orders
          - health_check
          - preopen_failsafe
          - risk_monitor
          - halt_now
          - resume_trading
          - paper_report
          - leak_report
          - pnl_calendar
          - weekly_report
          - withdrawal
          - abtest
          - driftcheck
          - validate
          - shadow_report
      dry_run:
        description: 'Dry run (execute_orb only): run the full path but place NO orders'
        required: false
        type: boolean
        default: false
      ticker:
        description: 'Ticker for backtest (default SPY)'
        required: false
        type: string
        default: 'SPY'
      slippage_bps:
        description: 'Backtest per-leg slippage bps (1 = ~3bps round trip default, 3 = ~7bps stress)'
        required: false
        type: string
        default: '1'

concurrency:
  # Serialize identical triggers so two firings can't both act. Combined with the
  # deterministic client_order_id (broker rejects duplicates), this prevents a
  # double-entry even if the PC and the Mac both fire. Queue, never cancel a run
  # mid-order.
  group: algo-${{ github.event.inputs.script || github.event.schedule }}
  cancel-in-progress: false

env:
  ALPACA_API_KEY_ID: ${{ secrets.ALPACA_API_KEY_ID }}
  ALPACA_API_SECRET_KEY: ${{ secrets.ALPACA_API_SECRET_KEY }}
  MOTHERDUCK_TOKEN: ${{ secrets.MOTHERDUCK_TOKEN }}
  SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
  ALPACA_PAPER: 'true'
  ALGO_TICKER: 'SPY'          # single-symbol default (backtest/manual)
  ALGO_TICKERS: 'SPY,QQQ'     # live trading set (execute/pre/EOD loop over these)
  ALGO_MAX_DAILY_LOSS: '0.03'    # hard daily stop (flatten + halt for the day, auto-resumes)
  ALGO_DAILY_LOSS_WARN: '0.0225' # early-warning email at 3/4 of the hard stop
  ALGO_DAILY_FLOOR: '0.50'       # catastrophic floor (flatten + STICKY halt, manual resume)
  ALGO_MAX_CONSEC_LOSSES: '5'    # consecutive losing days before a pause
  ALGO_CONSEC_PAUSE_DAYS: '2'    # trading-day pause after a consec-loss halt (auto-resume)
  ALGO_MAX_DRAWDOWN: '0.10'      # peak-to-current drawdown: STICKY halt (manual resume)
  ALGO_RISK_PER_TRADE: '0.03'    # 3% of current (paper: simulated) equity
  ALGO_LIVE_CAPITAL: '5000'      # reference; live sizing pulls actual equity
  ALGO_PAPER_SIM_EQUITY: '5000'  # paper sizes off this, not the ~$100k paper balance
  ALGO_PAPER_BASELINE: '100000'  # paper account starting balance
  DRY_RUN: ${{ github.event.inputs.dry_run || 'false' }}  # true only on a manual dry-run dispatch
  GMAIL_ADDRESS: ${{ secrets.GMAIL_ADDRESS }}
  GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}

jobs:
  pre-market:
    if: >
      (github.event_name == 'schedule' && (github.event.schedule == '25 13 * * 1-5' || github.event.schedule == '25 14 * * 1-5')) ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.script == 'pre_market')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
      - run: pip install -r requirements.txt
      - run: python -m src.pre_market

  execute-orb:
    if: >
      (github.event_name == 'schedule' && (github.event.schedule == '40 13 * * 1-5' || github.event.schedule == '40 14 * * 1-5')) ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.script == 'execute_orb')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
      - run: pip install -r requirements.txt
      - run: python -m src.execute_orb

  end-of-day:
    if: >
      (github.event_name == 'schedule' && (github.event.schedule == '45 19 * * 1-5' || github.event.schedule == '45 20 * * 1-5')) ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.script == 'end_of_day')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
      - run: pip install -r requirements.txt
      - run: python -m src.end_of_day

  backtest:
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.script == 'backtest'
    runs-on: ubuntu-latest
    env:
      ALGO_BT_SLIPPAGE_BPS: ${{ github.event.inputs.slippage_bps || '1' }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
      - run: pip install -r requirements.txt
      - run: python -m src.backtest --ticker ${{ github.event.inputs.ticker || 'SPY' }} --start 2024-01-01 --end 2026-06-01
      - uses: actions/upload-artifact@v4
        with:
          name: backtest-results
          path: backtest_*.csv

  param-sweep:
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.script == 'param_sweep'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
      - run: pip install -r requirements.txt
      - run: python -m src.param_sweep --start 2024-01-01 --end 2026-06-01
      - uses: actions/upload-artifact@v4
        with:
          name: sweep-results
          path: sweep_results_*.csv

  smoke-order:
    # Manual order-path test only. Places a tiny 1-share SPY bracket tagged
    # strategy='smoke_test'. Run end_of_day after to reconcile, then delete the rows.
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.script == 'smoke_order'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
      - run: pip install -r requirements.txt
      - run: python -m src.smoke_order

  cancel-orders:
    # Manual: cancel all open orders (clear stray/leftover orders).
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.script == 'cancel_orders'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
      - run: pip install -r requirements.txt
      - run: python -m src.cancel_orders

  health-check:
    # Independent morning watchdog (~09:58 ET): alarms LOUDLY if execute_orb did
    # not run today. Runs on a clock separate from the trigger, so a dead
    # trigger machine is exactly what it catches.
    if: >
      (github.event_name == 'schedule' && (github.event.schedule == '58 13 * * 1-5' || github.event.schedule == '58 14 * * 1-5')) ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.script == 'health_check')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
      - run: pip install -r requirements.txt
      - run: python -m src.health_check

  preopen-failsafe:
    # ~09:05 ET: verify keys + risk state where all creds are valid, and EMAIL a
    # green/red verdict ~35 min before the 09:40 execute. Verify-and-alert only.
    if: >
      (github.event_name == 'schedule' && (github.event.schedule == '5 13 * * 1-5' || github.event.schedule == '5 14 * * 1-5')) ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.script == 'preopen_failsafe')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
      - run: pip install -r requirements.txt
      - run: python -m src.preopen_failsafe

  risk-monitor:
    # Intraday daily-loss bumper. Warns at 3/4 of the stop, FLATTENS + halts at
    # the hard stop. ET-guarded inside to 10:00-15:35 so the broad UTC cron only
    # acts during market hours.
    if: >
      (github.event_name == 'schedule' && github.event.schedule == '*/30 13-20 * * 1-5') ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.script == 'risk_monitor')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
      - run: pip install -r requirements.txt
      - run: python -m src.risk_monitor

  halt-now:
    # Manual kill switch ON: sticky halt until resume_trading is run.
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.script == 'halt_now'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
      - run: pip install -r requirements.txt
      - run: python -m src.killswitch halt

  resume-trading:
    # Manual kill switch OFF: re-authorize trading after a manual halt.
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.script == 'resume_trading'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
      - run: pip install -r requirements.txt
      - run: python -m src.killswitch resume

  paper-report:
    # Print the paper-trading dashboard (Day N of 60, realized slippage, paper Sharpe).
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.script == 'paper_report'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
      - run: pip install -r requirements.txt
      - run: python -m src.paper_stats

  leak-report:
    # Leak finder over live/paper trades (segments net P&L to find leaks).
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.script == 'leak_report'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
      - run: pip install -r requirements.txt
      - run: python -m src.leakfinder --source motherduck --mode paper

  pnl-calendar:
    # Daily green/red P&L calendar + discipline score from the live tables.
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.script == 'pnl_calendar'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
      - run: pip install -r requirements.txt
      - run: python -m src.pnl_calendar --mode paper

  weekly-report:
    # Friday-after-close digest (P&L calendar + leak finder + paper dashboard),
    # emailed. Also runnable on demand.
    if: >
      (github.event_name == 'schedule' && github.event.schedule == '0 21 * * 5') ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.script == 'weekly_report')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
      - run: pip install -r requirements.txt
      - run: python -m src.weekly_report

  withdrawal:
    # Recommend-only profit sweep (OFF unless ALGO_WITHDRAWAL_ENABLED=true).
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.script == 'withdrawal'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
      - run: pip install -r requirements.txt
      - run: python -m src.withdrawal

  abtest:
    # Config A/B (baseline vs regime gate vs close-confirmed) + statistical
    # validation in one run, per ticker.
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.script == 'abtest'
    runs-on: ubuntu-latest
    env:
      ALGO_BT_SLIPPAGE_BPS: ${{ github.event.inputs.slippage_bps || '1' }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
      - run: pip install -r requirements.txt
      - run: python -m src.abtest --ticker ${{ github.event.inputs.ticker || 'SPY' }} --start 2024-01-01 --end 2026-06-01

  validate:
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.script == 'validate'
    runs-on: ubuntu-latest
    env:
      ALGO_BT_SLIPPAGE_BPS: ${{ github.event.inputs.slippage_bps || '1' }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
      - run: pip install -r requirements.txt
      - run: python -m src.validate --ticker ${{ github.event.inputs.ticker || 'SPY' }} --start 2024-01-01 --end 2026-06-01

  driftcheck:
    # Live-vs-backtest drift check (data-gated until live trades accumulate).
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.script == 'driftcheck'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
      - run: pip install -r requirements.txt
      - run: python -m src.driftcheck

  shadow-report:
    # Compare the live shadow A/B track records (variant tandem).
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.script == 'shadow_report'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
      - run: pip install -r requirements.txt
      - run: python -m src.shadow --report
